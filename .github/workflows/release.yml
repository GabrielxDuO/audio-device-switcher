name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw
          if ($content -match "(?s)## \[$([regex]::Escape($version))\][^\n]*\n(.+?)(?=\n## \[|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "Release ${{ github.ref_name }}"
          }
          $notes | Out-File -FilePath release_notes.txt -Encoding utf8NoBOM

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          files: build/AudioDeviceSwitcher.exe
          draft: false
          prerelease: false
